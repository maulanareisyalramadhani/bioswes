<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOSWES - Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <h2>Login ke <span>BIOSWES</span></h2>
            <p>Silakan masuk untuk memesan tiket</p>

            <form action="#">
                <div class="input-group">
                    <label for="username">Username / Email</label>
                    <input type="text" id="username" placeholder="Masukkan username Anda" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password Anda" required>
                </div>

                <button type="submit" class="btn-login">Masuk</button>
            </form>

            <div class="login-footer">
                <p>Belum punya akun? <a href="#">Daftar Sekarang</a></p>
                <p><a href="index.html" class="back-home">← Kembali ke Beranda</a></p>
            </div>
        </div>
    </div>

</body>
</html>
